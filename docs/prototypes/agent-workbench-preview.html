<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>LobsterAI 对话原型</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fa;
      --panel: #fbfcff;
      --text: #1b1f2a;
      --muted: #737b8a;
      --quiet: #a7afbd;
      --line: #e3e7ee;
      --line-strong: #d8dee8;
      --primary: #5d8fe8;
      --primary-soft: #edf4ff;
      --primary-border: #ccddf7;
      --control-bg: #f3f7ff;
      --control-bg-strong: #eaf2ff;
      --control-border: #d4e1f4;
      --control-text: #61748f;
      --control-text-strong: #4777d2;
      --send-bg: #7da8f3;
      --send-bg-hover: #6798ea;
      --shadow: 0 18px 42px rgba(31, 41, 55, 0.08);
      --control-shadow: 0 8px 18px rgba(31, 41, 55, 0.05);
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      color: var(--text);
      font-family: Inter,
      ui-sans-serif,
      system-ui,
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      "PingFang SC",
      "Microsoft YaHei",
      sans-serif;
      background: var(--bg);
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 36px 48px;
    }

    .shell {
      width: min(1060px, 100%);
      transform: translateY(-8px);
      text-align: center;
    }

    h1 {
      margin: 0 0 14px;
      color: var(--text);
      font-size: clamp(32px, 4vw, 44px);
      line-height: 1.08;
      letter-spacing: 0;
      font-weight: 820;
    }

    .subtitle {
      margin: 0 auto 32px;
      max-width: 760px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
      letter-spacing: 0;
    }

    .composer {
      width: min(900px, 100%);
      min-height: 178px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      overflow: visible;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--panel);
      box-shadow: var(--shadow);
      text-align: left;
    }

    textarea {
      width: 100%;
      flex: 1;
      min-height: 100px;
      resize: none;
      border: 0;
      outline: 0;
      padding: 20px 24px 4px;
      background: transparent;
      color: var(--text);
      font-size: 16px;
      line-height: 1.75;
    }

    textarea::placeholder {
      color: var(--quiet);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 6px 14px 14px;
      background: var(--panel);
    }

    .tools {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 9px;
      min-width: 0;
    }

    .icon-button,
    .tool,
    .send {
      border: 1px solid var(--control-border);
      background: var(--control-bg);
      color: var(--control-text);
      box-shadow: var(--control-shadow);
      transition: border-color 150ms ease,
      background 150ms ease,
      color 150ms ease,
      box-shadow 150ms ease,
      transform 150ms ease;
    }

    .icon-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 13px;
      padding: 0;
    }

    .icon-button svg,
    .send svg {
      width: 17px;
      height: 17px;
    }

    .tool {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      height: 36px;
      max-width: 100%;
      border-radius: 13px;
      padding: 0 12px;
      font-size: 13px;
      font-weight: 720;
      white-space: nowrap;
    }

    .tool.primary {
      border-color: var(--control-border);
      background: var(--control-bg-strong);
      color: var(--control-text-strong);
      box-shadow: inset 0 0 0 1px rgba(93, 143, 232, 0.1);
    }

    .agent-picker {
      position: relative;
    }

    .agent-trigger {
      min-width: 252px;
    }

    .agent-caret {
      width: 7px;
      height: 7px;
      margin-left: auto;
      border-right: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      opacity: 0.55;
      transform: rotate(45deg) translateY(-2px);
      transition: transform 150ms ease;
    }

    .agent-picker.is-open .agent-caret {
      transform: rotate(225deg) translate(-2px, -1px);
    }

    .tool svg {
      width: 16px;
      height: 16px;
      color: currentColor;
      flex: 0 0 auto;
    }

    .tool-label {
      color: var(--control-text);
      font-weight: 720;
    }

    .tool.primary .tool-label {
      color: var(--control-text-strong);
    }

    .agent-current {
      color: var(--control-text-strong);
      font-size: 13px;
      font-weight: 780;
    }

    .agent-menu {
      position: absolute;
      left: 0;
      bottom: calc(100% + 10px);
      z-index: 5;
      width: 430px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--control-border);
      border-radius: 18px;
      background: #fbfcff;
      box-shadow: 0 24px 60px rgba(31, 41, 55, 0.15);
      opacity: 0;
      pointer-events: none;
      transform: translateY(6px) scale(0.985);
      transform-origin: bottom left;
      transition: opacity 140ms ease,
      transform 140ms ease;
    }

    .agent-menu::after {
      content: "";
      position: absolute;
      left: 28px;
      bottom: -7px;
      width: 14px;
      height: 14px;
      border-right: 1px solid var(--control-border);
      border-bottom: 1px solid var(--control-border);
      background: var(--control-bg);
      transform: rotate(45deg);
    }

    .agent-picker.is-open .agent-menu {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }

    .agent-menu-head {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 2px 2px 4px;
    }

    .agent-menu-head strong {
      color: var(--text);
      font-size: 13px;
      font-weight: 800;
    }

    .agent-menu-head span {
      color: var(--quiet);
      font-size: 11.5px;
      font-weight: 660;
    }

    .agent-option {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr) 18px;
      gap: 9px;
      align-items: center;
      width: 100%;
      min-height: 56px;
      border: 1px solid transparent;
      border-radius: 14px;
      background: transparent;
      padding: 8px 9px;
      color: var(--text);
      text-align: left;
    }

    .agent-option:hover,
    .agent-option:focus-visible {
      border-color: var(--control-border);
      background: rgba(243, 247, 255, 0.8);
      outline: 0;
    }

    .agent-option.is-selected {
      border-color: var(--primary-border);
      background: var(--control-bg-strong);
      box-shadow: inset 0 0 0 1px rgba(93, 143, 232, 0.08);
      outline: 0;
    }

    .agent-option:first-of-type {
      grid-column: 1 / -1;
    }

    .agent-dot {
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 9px;
      background: #e7effb;
      color: var(--control-text-strong);
      font-size: 11.5px;
      font-weight: 820;
    }

    .agent-option-copy {
      min-width: 0;
    }

    .agent-option strong,
    .agent-option-copy span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .agent-option strong {
      font-size: 12.5px;
      font-weight: 780;
    }

    .agent-option-copy span {
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 620;
    }

    .agent-check {
      display: grid;
      place-items: center;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: rgba(93, 143, 232, 0.14);
      color: var(--control-text-strong);
      font-size: 11px;
      font-weight: 900;
      opacity: 0;
    }

    .agent-option.is-selected .agent-check {
      opacity: 1;
    }

    .send {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 999px;
      background: var(--send-bg);
      color: #ffffff;
      box-shadow: 0 10px 24px rgba(93, 143, 232, 0.26);
    }

    .icon-button:hover,
    .icon-button:focus-visible,
    .tool:hover,
    .tool:focus-visible {
      border-color: var(--primary-border);
      color: var(--control-text-strong);
      outline: 0;
      box-shadow: 0 8px 20px rgba(31, 41, 55, 0.07);
    }

    .send:hover,
    .send:focus-visible {
      background: var(--send-bg-hover);
      outline: 0;
      transform: translateY(-1px);
    }

    .send.is-sent {
      transform: scale(0.94);
    }

    body.is-chat .page {
      align-items: stretch;
      justify-content: flex-start;
      padding: 0;
    }

    .chat-shell {
      width: 100%;
      min-height: 0;
      display: flex;
      flex: 1;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    .chat-stream {
      width: min(920px, 100%);
      margin: 0 auto;
      display: flex;
      flex: 1;
      flex-direction: column;
      gap: 22px;
      overflow-y: auto;
      padding: 46px 20px 22px;
      text-align: left;
    }

    .message {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 100%;
    }

    .message.user {
      justify-content: flex-end;
    }

    .message.assistant {
      align-self: flex-start;
    }

    .bubble {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #ffffff;
      color: var(--text);
      padding: 11px 13px;
      font-size: 14px;
      line-height: 1.7;
      box-shadow: none;
    }

    .message.assistant .bubble {
      max-width: 720px;
      border: 0;
      background: transparent;
      padding: 2px 0 0;
    }

    .message.user .bubble {
      max-width: min(680px, 82%);
      border-color: var(--primary-border);
      background: var(--control-bg-strong);
      color: #2c4f88;
    }

    .assistant-panel {
      width: min(720px, calc(100% - 40px));
      margin-left: 0;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #ffffff;
      padding: 12px;
      box-shadow: none;
    }

    .assistant-panel h2 {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 820;
      text-transform: uppercase;
    }

    .task-steps {
      display: grid;
      gap: 8px;
    }

    .task-step {
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: #fbfcff;
      padding: 8px 9px;
    }

    .step-dot {
      display: grid;
      place-items: center;
      width: 22px;
      height: 22px;
      border-radius: 999px;
      background: var(--control-bg);
      color: var(--control-text-strong);
      font-size: 11px;
      font-weight: 820;
    }

    .task-step strong,
    .task-step span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .task-step strong {
      color: var(--text);
      font-size: 12.5px;
      font-weight: 780;
    }

    .task-step span {
      margin-top: 2px;
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 620;
    }

    .step-state {
      color: var(--control-text-strong);
      font-size: 11.5px;
      font-weight: 760;
      white-space: nowrap;
    }

    .chat-composer {
      width: min(920px, 100%);
      margin: 0 auto;
      padding: 12px 20px 18px;
      background: var(--bg);
    }

    .chat-input {
      min-height: 74px;
      max-height: 120px;
      border: 0;
      border-radius: 0;
      background: transparent;
      padding: 15px 18px 8px;
      color: var(--text);
      font-size: 14px;
      line-height: 1.55;
      resize: none;
    }

    .chat-input::placeholder {
      color: var(--quiet);
      opacity: 1;
    }

    .chat-input:focus {
      outline: 0;
    }

    .chat-composer-inner {
      width: min(920px, 100%);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--control-border);
      border-radius: 20px;
      background: #ffffff;
      padding: 0;
      box-shadow: 0 10px 28px rgba(31, 41, 55, 0.06);
    }

    .chat-composer-inner:focus-within {
      border-color: var(--primary-border);
      box-shadow: 0 0 0 3px rgba(93, 143, 232, 0.12);
    }

    .chat-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 12px 12px;
    }

    .chat-tools {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 9px;
      min-width: 0;
    }

    .chat-composer .icon-button,
    .chat-composer .tool {
      height: 34px;
      border-radius: 12px;
    }

    .chat-composer .icon-button {
      width: 34px;
    }

    .chat-composer .tool {
      padding: 0 11px;
      font-size: 12.5px;
    }

    .chat-agent-tool {
      min-width: 246px;
    }

    @media (max-width: 760px) {
      .page {
        align-items: flex-start;
        padding: 44px 18px;
      }

      .shell {
        transform: none;
      }

      .subtitle {
        margin-bottom: 26px;
        font-size: 15px;
      }

      .composer {
        min-height: 238px;
      }

      textarea {
        min-height: 142px;
        padding: 22px 20px 8px;
        font-size: 15px;
      }

      .toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .tools {
        align-items: stretch;
      }

      .tool.primary {
        flex: 1 1 100%;
      }

      .agent-trigger {
        min-width: 0;
        width: 100%;
      }

      .agent-menu {
        width: min(430px, calc(100vw - 64px));
        grid-template-columns: 1fr;
      }

      .agent-menu-head {
        align-items: flex-start;
        flex-direction: column;
        gap: 2px;
      }

      .tool {
        font-size: 13px;
      }

      .send {
        align-self: flex-end;
      }

      body.is-chat .page {
        padding: 12px;
      }

      .chat-composer {
        padding: 12px;
      }

      .chat-input {
        min-height: 82px;
      }

      .chat-toolbar {
        align-items: stretch;
        flex-direction: column;
        gap: 10px;
      }

      .chat-tools {
        align-items: stretch;
      }

      .chat-agent-tool {
        min-width: 0;
        width: 100%;
      }

      .assistant-panel {
        width: 100%;
        margin-left: 0;
      }

      .message.user .bubble {
        max-width: 86%;
      }
    }
  </style>
</head>
<body>
<main class="page">
  <section aria-labelledby="page-title" class="shell landing-shell">
    <h1 id="page-title">接下来要完成什么？</h1>
    <p class="subtitle">
      直接输入目标，系统会按本空间 Agent、知识库和调研能力处理。
    </p>

    <form class="composer">
        <textarea
          aria-label="对话消息"
          enterkeyhint="send"
          id="prompt"
          placeholder="例如：帮我调研 20 家自动化设备厂，并生成适合销售直接发送的第一版私信"
        ></textarea>

      <div class="toolbar">
        <div class="tools">
          <button aria-label="添加上下文" class="icon-button" title="添加上下文" type="button">
            <svg aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <path d="M12 5v14M5 12h14" stroke-linecap="round" />
            </svg>
          </button>

          <div class="agent-picker" id="agentPicker">
            <button aria-expanded="false" aria-haspopup="listbox" class="tool primary agent-trigger" type="button">
              <svg aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="7" />
                <circle cx="12" cy="12" r="2.3" />
                <path d="M12 3v3M12 18v3M3 12h3M18 12h3" stroke-linecap="round" />
              </svg>
              <span class="tool-label">目标 Agent</span>
              <span class="agent-current" id="agentCurrent">全部 / 通用助手</span>
              <span aria-hidden="true" class="agent-caret"></span>
            </button>

            <div aria-label="目标 Agent" class="agent-menu" role="listbox">
              <div aria-hidden="true" class="agent-menu-head">
                <strong>选择目标 Agent</strong>
                <span>自动编排或指定一个专属角色</span>
              </div>
              <button aria-selected="true" class="agent-option is-selected" data-agent="全部 / 通用助手" role="option"
                      type="button">
                <span class="agent-dot">A</span>
                <span class="agent-option-copy">
                    <strong>全部 / 通用助手</strong>
                    <span>自动判断任务需要的 Agent</span>
                  </span>
                <span class="agent-check">✓</span>
              </button>
              <button aria-selected="false" class="agent-option" data-agent="项目总控 Agent" role="option"
                      type="button">
                <span class="agent-dot">总</span>
                <span class="agent-option-copy">
                    <strong>项目总控 Agent</strong>
                    <span>拆解目标、安排流程和检查进度</span>
                  </span>
                <span class="agent-check">✓</span>
              </button>
              <button aria-selected="false" class="agent-option" data-agent="商机雷达 Agent" role="option"
                      type="button">
                <span class="agent-dot">商</span>
                <span class="agent-option-copy">
                    <strong>商机雷达 Agent</strong>
                    <span>寻找线索、公司信号和切入点</span>
                  </span>
                <span class="agent-check">✓</span>
              </button>
              <button aria-selected="false" class="agent-option" data-agent="销售交接 Agent" role="option"
                      type="button">
                <span class="agent-dot">销</span>
                <span class="agent-option-copy">
                    <strong>销售交接 Agent</strong>
                    <span>生成私信、邮件和跟进话术</span>
                  </span>
                <span class="agent-check">✓</span>
              </button>
              <button aria-selected="false" class="agent-option" data-agent="风控审核 Agent" role="option"
                      type="button">
                <span class="agent-dot">审</span>
                <span class="agent-option-copy">
                    <strong>风控审核 Agent</strong>
                    <span>检查事实依据、风险和表达边界</span>
                  </span>
                <span class="agent-check">✓</span>
              </button>
            </div>
          </div>

          <button class="tool" type="button">
            <svg aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <path d="m21 21-4.3-4.3" stroke-linecap="round" />
              <circle cx="11" cy="11" r="6" />
            </svg>
            调研未配置
          </button>
          <button class="tool" type="button">
            <svg aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <path d="M5 5.5A2.5 2.5 0 0 1 7.5 3H20v16H7.5A2.5 2.5 0 0 0 5 21.5v-16Z" stroke-linejoin="round" />
              <path d="M5 5.5v16" stroke-linecap="round" />
            </svg>
            引用知识库
          </button>
        </div>

        <button aria-keyshortcuts="Enter" aria-label="发送" class="send" title="Enter 发送，Shift+Enter 换行"
                type="submit">
          <svg aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path d="m5 4 14 8-14 8 2.7-8L5 4Z" stroke-linejoin="round" />
            <path d="M8 12h6" stroke-linecap="round" />
          </svg>
        </button>
      </div>
    </form>
  </section>

  <section aria-label="对话界面" class="chat-shell" hidden>
    <div class="chat-stream" id="chatStream">
      <article class="message user">
        <div class="bubble" id="userPromptText">
          帮我调研 20 家自动化设备厂，并生成适合销售直接发送的第一版私信
        </div>
      </article>

      <article class="message assistant">
        <div class="bubble">
          已收到。我会先拆解目标，再按客户线索、产品匹配度和触达话术整理第一版结果。
        </div>
      </article>

      <section aria-label="执行过程" class="assistant-panel">
        <h2>执行过程</h2>
        <div class="task-steps">
          <div class="task-step">
            <span class="step-dot">1</span>
            <span>
                <strong>理解目标</strong>
                <span>确认行业范围、客户画像和输出格式</span>
              </span>
            <span class="step-state">已完成</span>
          </div>
          <div class="task-step">
            <span class="step-dot">2</span>
            <span>
                <strong>准备调研</strong>
                <span>等待调研能力配置后补齐外部信息</span>
              </span>
            <span class="step-state">待配置</span>
          </div>
          <div class="task-step">
            <span class="step-dot">3</span>
            <span>
                <strong>生成销售内容</strong>
                <span>输出表格、切入点和第一版私信</span>
              </span>
            <span class="step-state">排队中</span>
          </div>
        </div>
      </section>
    </div>

    <form class="chat-composer">
      <div class="chat-composer-inner">
          <textarea
            aria-label="继续对话"
            class="chat-input"
            enterkeyhint="send"
            id="chatPrompt"
            placeholder="继续补充要求，Enter 发送，Shift+Enter 换行"
          ></textarea>
        <div class="chat-toolbar">
          <div class="chat-tools">
            <button aria-label="添加上下文" class="icon-button" title="添加上下文" type="button">
              <svg aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                <path d="M12 5v14M5 12h14" stroke-linecap="round" />
              </svg>
            </button>
            <button class="tool primary chat-agent-tool" type="button">
              <svg aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                <path d="M12 3.8 19.1 8v8L12 20.2 4.9 16V8L12 3.8Z" />
                <path d="M12 8.5v3.8l3.1 1.8" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
              <span class="tool-label">目标 Agent</span>
              <span class="agent-current">全部 / 通用助手</span>
            </button>
            <button class="tool" type="button">
              <svg aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                <path d="m20 20-4.6-4.6" stroke-linecap="round" />
                <circle cx="11" cy="11" r="6.2" />
              </svg>
              调研未配置
            </button>
            <button class="tool" type="button">
              <svg aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                <path d="M7 4.8h9.2A1.8 1.8 0 0 1 18 6.6v12.6H7A1.8 1.8 0 0 1 5.2 17.4V6.6A1.8 1.8 0 0 1 7 4.8Z" />
                <path d="M8.2 16.6H18" stroke-linecap="round" />
              </svg>
              引用知识库
            </button>
          </div>
          <button aria-label="发送消息" class="send" title="Enter 发送，Shift+Enter 换行" type="submit">
            <svg aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <path d="m5 4 14 8-14 8 2.7-8L5 4Z" stroke-linejoin="round" />
              <path d="M8 12h6" stroke-linecap="round" />
            </svg>
          </button>
        </div>
      </div>
    </form>
  </section>
</main>

<script>
  const landingShell = document.querySelector('.landing-shell');
  const chatShell = document.querySelector('.chat-shell');
  const userPromptText = document.querySelector('#userPromptText');
  const chatStream = document.querySelector('#chatStream');
  const chatComposer = document.querySelector('.chat-composer');
  const chatPrompt = document.querySelector('#chatPrompt');
  const composer = document.querySelector('.composer');
  const promptInput = document.querySelector('#prompt');
  const sendButton = document.querySelector('.send');
  const agentPicker = document.querySelector('#agentPicker');
  const agentTrigger = agentPicker.querySelector('.agent-trigger');
  const agentCurrent = document.querySelector('#agentCurrent');
  const agentOptions = agentPicker.querySelectorAll('.agent-option');

  const closeAgentMenu = () => {
    agentPicker.classList.remove('is-open');
    agentTrigger.setAttribute('aria-expanded', 'false');
  };

  agentTrigger.addEventListener('click', () => {
    const isOpen = agentPicker.classList.toggle('is-open');
    agentTrigger.setAttribute('aria-expanded', String(isOpen));
  });

  agentOptions.forEach((option) => {
    option.addEventListener('click', () => {
      agentCurrent.textContent = option.dataset.agent;
      agentOptions.forEach((item) => {
        const isSelected = item === option;
        item.classList.toggle('is-selected', isSelected);
        item.setAttribute('aria-selected', String(isSelected));
      });
      closeAgentMenu();
    });
  });

  document.addEventListener('click', (event) => {
    if (!agentPicker.contains(event.target)) {
      closeAgentMenu();
    }
  });

  document.addEventListener('keydown', (event) => {
    if (event.key === 'Escape') {
      closeAgentMenu();
    }
  });

  const showChat = (promptText) => {
    userPromptText.textContent = promptText;
    landingShell.hidden = true;
    chatShell.hidden = false;
    document.body.classList.add('is-chat');
    chatPrompt.focus();
  };

  const appendChatMessage = (text, type = 'user') => {
    const article = document.createElement('article');
    article.className = `message ${type}`;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    article.append(bubble);
    chatStream.append(article);
    chatStream.scrollTop = chatStream.scrollHeight;
  };

  const submitPrompt = () => {
    if (!promptInput.value.trim()) {
      promptInput.focus();
      return;
    }

    const promptText = promptInput.value.trim();
    closeAgentMenu();
    sendButton.classList.add('is-sent');
    window.setTimeout(() => sendButton.classList.remove('is-sent'), 180);
    promptInput.value = '';
    showChat(promptText);
  };

  promptInput.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' && !event.shiftKey && !event.isComposing) {
      event.preventDefault();
      composer.requestSubmit();
    }
  });

  composer.addEventListener('submit', (event) => {
    event.preventDefault();
    submitPrompt();
  });

  chatPrompt.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' && !event.shiftKey && !event.isComposing) {
      event.preventDefault();
      chatComposer.requestSubmit();
    }
  });

  chatComposer.addEventListener('submit', (event) => {
    event.preventDefault();
    const text = chatPrompt.value.trim();
    if (!text) {
      chatPrompt.focus();
      return;
    }

    appendChatMessage(text);
    chatPrompt.value = '';
    window.setTimeout(() => {
      appendChatMessage('收到，我会把这个要求合并到当前任务里继续处理。', 'assistant');
    }, 180);
  });
</script>
</body>
</html>

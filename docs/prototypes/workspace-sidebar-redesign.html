<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1" name="viewport">
  <title>工作区左侧导航原型</title>
  <style>
    :root {
      color-scheme: light;
      --app-bg: #f4f6fa;
      --panel: #ffffff;
      --panel-soft: #f8fafd;
      --surface: #f3f6fb;
      --surface-strong: #edf3ff;
      --line: #dfe5ee;
      --line-soft: #edf1f6;
      --text: #151b2a;
      --text-soft: #4f596a;
      --muted: #758092;
      --faint: #a1aabb;
      --primary: #2f6fed;
      --primary-soft: #eaf2ff;
      --primary-border: #cdddfb;
      --green: #12a474;
      --green-soft: #e8f7f1;
      --amber: #b7791f;
      --amber-soft: #fff5df;
      --danger: #dc2626;
      --shadow: 0 24px 70px rgba(20, 31, 50, 0.13);
      --small-shadow: 0 12px 28px rgba(20, 31, 50, 0.08);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      background: var(--app-bg);
      color: var(--text);
    }

    button {
      font: inherit;
      cursor: pointer;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
    }

    .app {
      width: min(1220px, 100%);
      height: min(780px, calc(100vh - 56px));
      min-height: 620px;
      display: grid;
      grid-template-columns: 292px minmax(0, 1fr);
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .sidebar {
      min-height: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff 0%, #fbfcff 52%, #f8fafd 100%);
      padding: 14px 12px;
    }

    .nav {
      display: grid;
      gap: 3px;
      flex: 0 0 auto;
      padding: 0;
    }

    .nav-item,
    .session-button,
    .exit-button,
    .delete-button,
    .toolbar-button,
    .primary-button {
      border: 0;
      background: transparent;
      color: inherit;
      outline: 0;
    }

    .nav-item,
    .exit-button {
      position: relative;
      height: 36px;
      display: grid;
      grid-template-columns: 26px minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      border-radius: 7px;
      padding: 0 8px;
      color: var(--muted);
      text-align: left;
      font-size: 13px;
      font-weight: 650;
      letter-spacing: 0;
      transition: background 150ms ease, color 150ms ease, box-shadow 150ms ease;
    }

    .nav-item:hover,
    .exit-button:hover {
      background: var(--surface);
      color: var(--text);
    }

    .nav-item.is-active {
      color: var(--text);
      background: var(--primary-soft);
      box-shadow: inset 0 0 0 1px rgba(47, 111, 237, 0.12);
    }

    .nav-item.is-active::before,
    .session-row.is-active::before {
      content: "";
      position: absolute;
      left: 5px;
      top: 8px;
      bottom: 8px;
      width: 2px;
      border-radius: 999px;
      background: var(--primary);
    }

    .icon {
      width: 26px;
      height: 26px;
      display: grid;
      place-items: center;
      color: var(--faint);
    }

    .nav-item.is-active .icon {
      color: var(--primary);
    }

    .icon svg {
      width: 17px;
      height: 17px;
      stroke-width: 1.85;
    }

    .label {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .conversations {
      min-height: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      margin-top: 16px;
      padding-top: 2px;
      overflow: hidden;
    }

    .section-title {
      padding: 0 2px 8px 4px;
      color: var(--text-soft);
      font-size: 12px;
      line-height: 18px;
      font-weight: 720;
    }

    .session-list {
      min-height: 0;
      flex: 1;
      display: grid;
      align-content: start;
      gap: 3px;
      overflow-y: auto;
      padding-right: 3px;
      scrollbar-color: #c8d1df transparent;
      scrollbar-gutter: stable;
      scrollbar-width: thin;
    }

    .session-list::-webkit-scrollbar {
      width: 10px;
    }

    .session-list::-webkit-scrollbar-track {
      background: transparent;
      margin-block: 6px;
    }

    .session-list::-webkit-scrollbar-thumb {
      border: 3px solid transparent;
      border-radius: 999px;
      background: #c8d1df;
      background-clip: content-box;
    }

    .session-row {
      position: relative;
      min-height: 40px;
      display: flex;
      align-items: center;
      border-radius: 9px;
      color: var(--muted);
      transition: background 150ms ease, color 150ms ease, box-shadow 150ms ease;
    }

    .session-row:hover {
      background: var(--surface);
      color: var(--text);
    }

    .session-row.is-active {
      background: var(--primary-soft);
      color: var(--text);
      box-shadow: inset 0 0 0 1px rgba(47, 111, 237, 0.13);
    }

    .session-button {
      min-width: 0;
      min-height: 40px;
      width: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      border-radius: 9px;
      padding: 7px 36px 7px 12px;
      text-align: left;
      color: inherit;
    }

    .session-name {
      min-width: 0;
      overflow: hidden;
      color: inherit;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      line-height: 20px;
      font-weight: 650;
    }

    .date {
      height: 20px;
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.74);
      color: var(--faint);
      padding: 0 6px;
      font-size: 11px;
      font-weight: 720;
      transition: opacity 130ms ease;
    }

    .session-row:hover .date,
    .session-row:focus-within .date {
      opacity: 0;
    }

    .delete-button {
      position: absolute;
      right: 6px;
      top: 50%;
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 7px;
      color: var(--faint);
      opacity: 0;
      transform: translateY(-50%);
      transition: background 150ms ease, color 150ms ease, opacity 150ms ease;
    }

    .session-row:hover .delete-button,
    .session-row:focus-within .delete-button {
      opacity: 1;
    }

    .delete-button:hover {
      background: rgba(220, 38, 38, 0.08);
      color: var(--danger);
    }

    .delete-button svg {
      width: 16px;
      height: 16px;
    }

    .exit {
      flex: 0 0 auto;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line-soft);
    }

    .main {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      background: #f7f9fc;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 20px 24px;
      border-bottom: 1px solid var(--line-soft);
      background: rgba(255, 255, 255, 0.76);
      backdrop-filter: blur(16px);
    }

    .eyebrow {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 18px;
      font-weight: 700;
    }

    h1 {
      margin: 2px 0 0;
      color: var(--text);
      font-size: 22px;
      line-height: 30px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .toolbar-button,
    .primary-button {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      border-radius: 8px;
      padding: 0 12px;
      font-size: 12px;
      font-weight: 720;
      transition: background 150ms ease, border-color 150ms ease, color 150ms ease;
    }

    .toolbar-button {
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--text-soft);
    }

    .toolbar-button:hover {
      background: var(--surface);
      color: var(--text);
    }

    .primary-button {
      background: var(--primary);
      color: #ffffff;
    }

    .workspace {
      min-height: 0;
      overflow: auto;
      padding: 22px 24px 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(280px, 0.92fr);
      gap: 18px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      box-shadow: var(--small-shadow);
    }

    .panel-header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--line-soft);
    }

    .panel-title {
      margin: 0;
      font-size: 15px;
      line-height: 22px;
      font-weight: 800;
    }

    .panel-desc {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 20px;
    }

    .task-list,
    .agent-list {
      display: grid;
      gap: 10px;
      padding: 14px;
    }

    .task {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--line-soft);
      border-radius: 10px;
      background: var(--panel-soft);
    }

    .task-icon {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 9px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 13px;
      font-weight: 800;
    }

    .task-title,
    .agent-name {
      font-size: 13px;
      line-height: 20px;
      font-weight: 760;
    }

    .task-meta,
    .agent-role {
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      line-height: 18px;
    }

    .pill {
      height: 24px;
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 0 9px;
      font-size: 11px;
      font-weight: 760;
      white-space: nowrap;
    }

    .pill.green {
      background: var(--green-soft);
      color: var(--green);
    }

    .pill.amber {
      background: var(--amber-soft);
      color: var(--amber);
    }

    .agent {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--line-soft);
      border-radius: 10px;
      background: #ffffff;
    }

    .avatar {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 9px;
      background: var(--surface-strong);
      color: var(--primary);
      font-size: 12px;
      font-weight: 850;
    }

    @media (max-width: 1080px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 780px) {
      .page {
        padding: 0;
      }

      .app {
        width: 100%;
        height: 100vh;
        min-height: 0;
        grid-template-columns: 78px minmax(0, 1fr);
        border: 0;
        border-radius: 0;
      }

      .sidebar {
        padding: 10px 8px;
      }

      .nav-item,
      .exit-button {
        grid-template-columns: 1fr;
        justify-items: center;
        padding: 0;
      }

      .nav-item .label,
      .exit-button .label,
      .conversations {
        display: none;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

<main class="page">
  <section aria-label="工作区导航原型" class="app">
    <aside class="sidebar">
      <nav aria-label="线索工作区" class="nav">
        <button class="nav-item is-active" data-page="工作台" type="button">
          <span class="icon"><svg><use href="#icon-dashboard" /></svg></span>
          <span class="label">工作台</span>
        </button>
        <button class="nav-item" data-page="新对话" type="button">
          <span class="icon"><svg><use href="#icon-chat" /></svg></span>
          <span class="label">新对话</span>
        </button>
        <button class="nav-item" data-page="搜索" type="button">
          <span class="icon"><svg><use href="#icon-search" /></svg></span>
          <span class="label">搜索</span>
        </button>
        <button class="nav-item" data-page="知识库" type="button">
          <span class="icon"><svg><use href="#icon-book" /></svg></span>
          <span class="label">知识库</span>
        </button>
        <button class="nav-item" data-page="Agent 团队" type="button">
          <span class="icon"><svg><use href="#icon-team" /></svg></span>
          <span class="label">Agent 团队</span>
        </button>
      </nav>

      <section aria-label="对话列表" class="conversations">
        <div class="section-title">
          对话
        </div>
        <div class="session-list">
          <div class="session-row">
            <button class="session-button" type="button">
              <span class="session-name">1</span>
              <span class="date">今天</span>
            </button>
            <button aria-label="删除对话 1" class="delete-button" type="button">
              <svg>
                <use href="#icon-trash" />
              </svg>
            </button>
          </div>
          <div class="session-row is-active">
            <button class="session-button" type="button">
              <span class="session-name">123</span>
              <span class="date">今天</span>
            </button>
            <button aria-label="删除对话 123" class="delete-button" type="button">
              <svg>
                <use href="#icon-trash" />
              </svg>
            </button>
          </div>
          <div class="session-row">
            <button class="session-button" type="button">
              <span class="session-name">你好！</span>
              <span class="date">今天</span>
            </button>
            <button aria-label="删除对话 你好！" class="delete-button" type="button">
              <svg>
                <use href="#icon-trash" />
              </svg>
            </button>
          </div>
          <div class="session-row">
            <button class="session-button" type="button">
              <span class="session-name">你好</span>
              <span class="date">今天</span>
            </button>
            <button aria-label="删除对话 你好" class="delete-button" type="button">
              <svg>
                <use href="#icon-trash" />
              </svg>
            </button>
          </div>
          <div class="session-row">
            <button class="session-button" type="button">
              <span class="session-name">帮我判断这批客户谁更值得优先跟进</span>
              <span class="date">今天</span>
            </button>
            <button aria-label="删除对话 帮我判断这批客户谁更值得优先跟进" class="delete-button" type="button">
              <svg>
                <use href="#icon-trash" />
              </svg>
            </button>
          </div>
          <div class="session-row">
            <button class="session-button" type="button">
              <span class="session-name">客户名单优先级评估</span>
              <span class="date">今天</span>
            </button>
            <button aria-label="删除对话 客户名单优先级评估" class="delete-button" type="button">
              <svg>
                <use href="#icon-trash" />
              </svg>
            </button>
          </div>
          <div class="session-row">
            <button class="session-button" type="button">
              <span class="session-name">生成本周销售跟进清单</span>
              <span class="date">今天</span>
            </button>
            <button aria-label="删除对话 生成本周销售跟进清单" class="delete-button" type="button">
              <svg>
                <use href="#icon-trash" />
              </svg>
            </button>
          </div>
          <div class="session-row">
            <button class="session-button" type="button">
              <span class="session-name">整理汽车零部件厂线索</span>
              <span class="date">1 天</span>
            </button>
            <button aria-label="删除对话 整理汽车零部件厂线索" class="delete-button" type="button">
              <svg>
                <use href="#icon-trash" />
              </svg>
            </button>
          </div>
          <div class="session-row">
            <button class="session-button" type="button">
              <span class="session-name">更新知识库里的触达限制</span>
              <span class="date">2 天</span>
            </button>
            <button aria-label="删除对话 更新知识库里的触达限制" class="delete-button" type="button">
              <svg>
                <use href="#icon-trash" />
              </svg>
            </button>
          </div>
          <div class="session-row">
            <button class="session-button" type="button">
              <span class="session-name">检查外发文案风险</span>
              <span class="date">2 天</span>
            </button>
            <button aria-label="删除对话 检查外发文案风险" class="delete-button" type="button">

      <div class="exit">
        <button class="exit-button" type="button">
          <span class="icon"><svg><use href="#icon-back" /></svg></span>
          <span class="label">返回空间列表</span>
        </button>
      </div>
    </aside>

    <section class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow">华南重包获客工作台</p>
          <h1 id="page-title">工作台</h1>
        </div>
        <div class="top-actions">
          <button class="toolbar-button" type="button">同步知识库</button>
          <button class="toolbar-button" type="button">查看历史</button>
          <button class="primary-button" type="button">开始新任务</button>
        </div>
      </header>

      <div class="workspace">
        <div class="grid">
          <section class="panel">
            <div class="panel-header">
              <h2 class="panel-title">今日推进</h2>
              <p class="panel-desc">聚合当前空间里的线索、对话和 Agent 执行状态。</p>
            </div>
            <div class="task-list">
              <article class="task">
                <span class="task-icon">线</span>

<script>
  const pageTitle = document.querySelector('#page-title');

  document.querySelectorAll('.nav-item').forEach((button) => {
    button.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach((item) => item.classList.remove('is-active'));
      button.classList.add('is-active');
      pageTitle.textContent = button.dataset.page || '工作台';
    });
  });

  document.querySelectorAll('.session-row').forEach((row) => {
    row.querySelector('.session-button').addEventListener('click', () => {
      document.querySelectorAll('.session-row').forEach((item) => item.classList.remove('is-active'));
      row.classList.add('is-active');
    });
  });

  document.querySelectorAll('.delete-button').forEach((button) => {
    button.addEventListener('click', (event) => {
      event.stopPropagation();
      const row = button.closest('.session-row');
      if (row) {
        row.style.opacity = '0';
        row.style.transform = 'translateX(-8px)';
        setTimeout(() => row.remove(), 160);
      }
    });
  });
</script>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>工作区 Agent 管理原型</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-2: #f8fafc;
      --line: #dbe3ee;
      --line-soft: #e8eef5;
      --text: #172033;
      --muted: #667085;
      --quiet: #8a95a6;
      --primary: #2563eb;
      --primary-soft: #e8f0ff;
      --green: #0f8f63;
      --green-soft: #e8f7f1;
      --amber: #b7791f;
      --amber-soft: #fff7e6;
      --red: #c24135;
      --red-soft: #fff0ee;
      --shadow: 0 16px 40px rgba(23, 32, 51, 0.08);
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      display: grid;
      grid-template-columns: 196px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      border-right: 1px solid var(--line);
      background: var(--surface);
      padding: 18px 14px;
    }

    .workspace-kind {
      color: var(--muted);
      font-size: 12px;
      line-height: 18px;
    }

    .workspace-name {
      margin-top: 4px;
      font-size: 14px;
      font-weight: 700;
      line-height: 20px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .nav {
      display: grid;
      gap: 4px;
      margin-top: 22px;
    }

    .nav button {
      display: grid;
      grid-template-columns: 20px minmax(0, 1fr);
      align-items: center;
      height: 38px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      padding: 0 10px;
      text-align: left;
    }

    .nav button.active {
      background: var(--primary-soft);
      color: var(--primary);
      font-weight: 700;
    }

    .nav-icon {
      display: inline-grid;
      place-items: center;
      width: 18px;
      height: 18px;
      border-radius: 5px;
      border: 1px solid currentColor;
      font-size: 11px;
    }

    .page {
      min-width: 0;
      padding: 24px;
    }

    .shell {
      max-width: 1200px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 16px;
    }

    .eyebrow {
      color: var(--quiet);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0;
      line-height: 18px;
    }

    h1 {
      margin: 2px 0 0;
      font-size: 24px;
      line-height: 32px;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 6px 0 0;
      max-width: 680px;
      color: var(--muted);
      font-size: 14px;
      line-height: 22px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      padding: 0 13px;
      font-size: 13px;
      font-weight: 700;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease;
    }

    .btn:hover {
      background: var(--surface-2);
    }

    .btn.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: white;
    }

    .btn.primary:hover {
      background: #1d4ed8;
    }

    .btn.ghost {
      border-color: transparent;
      background: transparent;
      color: var(--muted);
    }

    .status-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .status-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: var(--surface);
      padding: 10px 12px;
      min-width: 0;
    }

    .status-item span:first-child {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 22px;
      border-radius: 999px;
      padding: 0 8px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .pill.ok {
      background: var(--green-soft);
      color: var(--green);
    }

    .pill.warn {
      background: var(--amber-soft);
      color: var(--amber);
    }

    .pill.neutral {
      background: var(--primary-soft);
      color: var(--primary);
    }

    .notice {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      border: 1px solid #cfe0ff;
      border-radius: 10px;
      background: #f4f8ff;
      color: #1e3f8f;
      padding: 11px 13px;
      margin-bottom: 14px;
      font-size: 13px;
      line-height: 20px;
    }

    .notice-mark {
      display: inline-grid;
      place-items: center;
      width: 20px;
      height: 20px;
      border-radius: 6px;
      background: var(--primary-soft);
      color: var(--primary);
      font-weight: 800;
      flex: 0 0 auto;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto auto;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      border-bottom: 0;
      border-radius: 10px 10px 0 0;
      background: var(--surface);
      padding: 12px;
    }

    .search {
      position: relative;
    }

    .search input {
      width: 100%;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-2);
      color: var(--text);
      padding: 0 12px;
      outline: none;
    }

    .search input:focus {
      border-color: var(--primary);
      background: var(--surface);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .select {
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      padding: 0 10px;
      outline: none;
      font-size: 13px;
      font-weight: 700;
    }

    .agent-table {
      border: 1px solid var(--line);
      border-radius: 0 0 10px 10px;
      overflow: hidden;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .table-head,
    .agent-row {
      display: grid;
      grid-template-columns: minmax(260px, 1.45fr) minmax(220px, 1fr) 128px 94px 116px;
      align-items: center;
      gap: 12px;
      padding: 0 14px;
    }

    .table-head {
      min-height: 42px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--line);
      color: var(--quiet);
      font-size: 12px;
      font-weight: 800;
    }

    .agent-row {
      min-height: 74px;
      border-bottom: 1px solid var(--line-soft);
    }

    .agent-row:last-child {
      border-bottom: 0;
    }

    .agent-row:hover {
      background: #fbfdff;
    }

    .agent-main {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr);
      gap: 11px;
      align-items: center;
      min-width: 0;
    }

    .avatar {
      display: inline-grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 14px;
      font-weight: 800;
    }

    .agent-title {
      min-width: 0;
    }

    .agent-title strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      line-height: 20px;
    }

    .agent-title small {
      display: block;
      margin-top: 2px;
      color: var(--quiet);
      font-size: 12px;
      line-height: 18px;
    }

    .summary {
      color: var(--muted);
      font-size: 13px;
      line-height: 20px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .meta {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 18px;
    }

    .meta strong {
      color: var(--text);
      font-size: 13px;
    }

    .row-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      position: relative;
    }

    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--muted);
      font-size: 18px;
      font-weight: 800;
    }

    .menu {
      position: absolute;
      right: 0;
      top: 40px;
      z-index: 3;
      display: none;
      width: 148px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 6px;
    }

    .menu.open {
      display: block;
    }

    .menu button {
      width: 100%;
      min-height: 32px;
      border: 0;
      border-radius: 7px;
      background: transparent;
      color: var(--text);
      padding: 0 9px;
      text-align: left;
      font-size: 13px;
    }

    .menu button:hover {
      background: var(--surface-2);
    }

    .menu button.danger {
      color: var(--red);
    }

    .density-loose .agent-row {
      min-height: 92px;
    }

    .density-loose .table-head,
    .density-loose .agent-row {
      grid-template-columns: minmax(280px, 1.35fr) minmax(280px, 1fr) 150px 104px 126px;
      padding-left: 18px;
      padding-right: 18px;
    }

    .debug-panel {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 4;
      width: 260px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
      padding: 12px;
      backdrop-filter: blur(10px);
    }

    .debug-panel h2 {
      margin: 0 0 8px;
      font-size: 13px;
      line-height: 18px;
    }

    .debug-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 34px;
      color: var(--muted);
      font-size: 12px;
      line-height: 18px;
    }

    .switch {
      position: relative;
      width: 38px;
      height: 22px;
      border: 0;
      border-radius: 999px;
      background: #cbd5e1;
      padding: 0;
    }

    .switch::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: white;
      transition: transform 160ms ease;
    }

    .switch.on {
      background: var(--primary);
    }

    .switch.on::after {
      transform: translateX(16px);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.48);
      padding: 28px;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 56px);
      width: min(860px, 100%);
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .modal-head,
    .modal-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }

    .modal-head h2 {
      margin: 0;
      font-size: 18px;
      line-height: 26px;
    }

    .modal-head p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 20px;
    }

    .modal-foot {
      justify-content: flex-end;
      border-top: 1px solid var(--line);
      border-bottom: 0;
    }

    .modal-body {
      overflow-y: auto;
      padding: 18px;
    }

    .form-section {
      margin-bottom: 20px;
    }

    .form-section:last-child {
      margin-bottom: 0;
    }

    .form-section h3 {
      margin: 0 0 10px;
      font-size: 13px;
      line-height: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      line-height: 18px;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      padding: 9px 10px;
      outline: none;
      font-size: 13px;
      line-height: 20px;
    }

    textarea {
      min-height: 88px;
      resize: vertical;
    }

    textarea.prompt {
      min-height: 170px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 20px;
    }

    input:focus,
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 26px;
      z-index: 12;
      display: none;
      transform: translateX(-50%);
      border-radius: 999px;
      background: #102033;
      color: white;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 700;
      box-shadow: var(--shadow);
    }

    .toast.show {
      display: block;
    }

    @media (max-width: 1060px) {
      .app {
        grid-template-columns: 72px minmax(0, 1fr);
      }

      .workspace-kind,
      .workspace-name,
      .nav span:last-child {
        display: none;
      }

      .sidebar {
        padding-left: 10px;
        padding-right: 10px;
      }

      .nav button {
        grid-template-columns: 1fr;
        place-items: center;
      }

      .status-strip {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .table-head {
        display: none;
      }

      .agent-table {
        display: grid;
        gap: 8px;
        border: 0;
        box-shadow: none;
        background: transparent;
      }

      .agent-row {
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        min-height: 0;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--surface);
        padding: 12px;
        box-shadow: var(--shadow);
      }

      .agent-row .summary,
      .agent-row .meta,
      .agent-row > .pill {
        grid-column: 1 / -1;
      }

      .row-actions {
        grid-column: 1 / -1;
        justify-content: flex-start;
      }
    }

    @media (max-width: 760px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }

      .page {
        padding: 16px;
      }

      .topbar,
      .toolbar {
        grid-template-columns: 1fr;
        display: grid;
      }

      .actions {
        justify-content: stretch;
      }

      .actions .btn {
        flex: 1;
      }

      .status-strip {
        grid-template-columns: 1fr;
      }

      .debug-panel {
        left: 16px;
        right: 16px;
        width: auto;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <aside class="sidebar">
      <div class="workspace-kind">企业获客空间</div>
      <div class="workspace-name">杭州启盛精密制造有限公司</div>
      <nav class="nav" aria-label="线索工作区">
        <button class="active" type="button"><span class="nav-icon">台</span><span>工作台</span></button>
        <button type="button"><span class="nav-icon">聊</span><span>AI 对话</span></button>
        <button type="button"><span class="nav-icon">知</span><span>知识库</span></button>
        <button type="button"><span class="nav-icon">记</span><span>创作记录</span></button>
        <button type="button"><span class="nav-icon">设</span><span>空间设置</span></button>
      </nav>
    </aside>

    <main class="page">
      <div class="shell">
        <header class="topbar">
          <div>
            <div class="eyebrow">当前空间专属配置</div>
            <h1>工作区 Agent</h1>
            <p class="subtitle">配置当前空间用于 AI 对话和任务执行的 Agent。编辑会保存到本空间，不影响其他空间。</p>
          </div>
          <div class="actions">
            <button class="btn" type="button" id="open-settings">空间设置</button>
            <button class="btn primary" type="button" id="new-agent">新建 Agent</button>
          </div>
        </header>

        <section class="status-strip" id="status-strip" aria-label="空间配置状态">
          <div class="status-item"><span>大模型</span><span class="pill ok">已配</span></div>
          <div class="status-item"><span>技能</span><span class="pill neutral">0</span></div>
          <div class="status-item"><span>调研能力</span><span class="pill warn">未配</span></div>
          <div class="status-item"><span>内容平台</span><span class="pill neutral">6</span></div>
        </section>

        <div class="notice" id="scope-notice">
          <span class="notice-mark">i</span>
          <span>这些 Agent 只在当前工作空间生效。低频操作收在更多菜单里，避免每一行都被按钮占满。</span>
        </div>

        <section aria-label="Agent 配置清单">
          <div class="toolbar">
            <div class="search">
              <input id="search" type="search" placeholder="搜索 Agent 名称、职责或能力">
            </div>
            <select class="select" id="status-filter" aria-label="按状态筛选">
              <option value="all">全部状态</option>
              <option value="enabled">仅启用</option>
              <option value="disabled">仅停用</option>
            </select>
            <select class="select" id="model-filter" aria-label="按模型筛选">
              <option value="all">全部模型</option>
              <option value="default">默认模型</option>
              <option value="custom">已覆盖模型</option>
            </select>
          </div>

          <div class="agent-table" id="agent-table">
            <div class="table-head" aria-hidden="true">
              <span>Agent</span>
              <span>职责</span>
              <span>模型 / 技能</span>
              <span>状态</span>
              <span>操作</span>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <section class="debug-panel" aria-label="调试面板">
    <h2>调试面板</h2>
    <div class="debug-option">
      <span>宽松行距</span>
      <button class="switch" type="button" id="density-switch" aria-label="切换宽松行距"></button>
    </div>
    <div class="debug-option">
      <span>显示配置状态条</span>
      <button class="switch on" type="button" id="status-switch" aria-label="显示或隐藏配置状态条"></button>
    </div>
    <div class="debug-option">
      <span>显示空间生效提示</span>
      <button class="switch on" type="button" id="notice-switch" aria-label="显示或隐藏空间生效提示"></button>
    </div>
  </section>

  <div class="modal-backdrop" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <section class="modal">
      <header class="modal-head">
        <div>
          <h2 id="modal-title">编辑工作区 Agent</h2>
          <p>修改只保存到当前工作空间，并会用于本空间的 AI 对话和下一次任务执行。</p>
        </div>
        <button class="btn ghost" type="button" id="close-modal" aria-label="关闭编辑弹窗">关闭</button>
      </header>
      <div class="modal-body">
        <section class="form-section">
          <h3>基本信息</h3>
          <div class="form-grid">
            <label>Agent 名称<input id="agent-name" value=""></label>
            <label>Agent 图标<input id="agent-icon" value=""></label>
            <label style="grid-column:1 / -1">Agent 介绍<textarea id="agent-desc"></textarea></label>
          </div>
        </section>
        <section class="form-section">
          <h3>执行设定</h3>
          <div class="form-grid">
            <label>Agent 身份<textarea id="agent-identity"></textarea></label>
            <label>Agent 系统提示词<textarea class="prompt" id="agent-prompt"></textarea></label>
          </div>
        </section>
        <section class="form-section">
          <h3>能力配置</h3>
          <div class="form-grid">
            <label>Agent 模型<input id="agent-model" placeholder="留空则使用空间默认模型"></label>
            <label>Agent 技能 ID<input id="agent-skills" placeholder="用英文逗号分隔"></label>
          </div>
        </section>
      </div>
      <footer class="modal-foot">
        <button class="btn" type="button" id="cancel-modal">取消</button>
        <button class="btn primary" type="button" id="save-modal">保存</button>
      </footer>
    </section>
  </div>

  <div class="toast" id="toast">已保存到当前工作空间</div>

  <script>
    const agents = [
      {
        icon: "总",
        name: "项目总控 Agent",
        role: "拆解任务、调度专业 Agent、汇总状态。",
        model: "默认模型",
        skills: "0 个技能",
        enabled: true,
        prompt: "理解目标、拆解任务、调度专业 Agent、汇总状态。"
      },
      {
        icon: "产",
        name: "产品理解 Agent",
        role: "整理产品画像、卖点、适合客户、应用场景和缺失资料。",
        model: "默认模型",
        skills: "0 个技能",
        enabled: true,
        prompt: "整理产品画像、卖点、适合客户、应用场景和缺失资料。\n输入：用户目标、企业资料、产品资料\n输出：产品画像、核心卖点、适合客户、缺失信息"
      },
      {
        icon: "商",
        name: "商机雷达 Agent",
        role: "判断客户方向、采购信号、商机评分和跟进优先级。",
        model: "默认模型",
        skills: "0 个技能",
        enabled: true,
        prompt: "判断客户方向、采购信号、商机评分和跟进优先级。"
      },
      {
        icon: "内",
        name: "内容策划 Agent",
        role: "生成小红书、短视频、公众号、产品介绍和销售话术草稿。",
        model: "默认模型",
        skills: "0 个技能",
        enabled: true,
        prompt: "生成小红书、短视频、公众号、产品介绍和销售话术草稿。"
      },
      {
        icon: "媒",
        name: "社媒运营 Agent",
        role: "生成发布计划、评论回复草稿、私信草稿和运营待办。",
        model: "默认模型",
        skills: "0 个技能",
        enabled: true,
        prompt: "生成发布计划、评论回复草稿、私信草稿和运营待办。"
      },
      {
        icon: "销",
        name: "销售交接 Agent",
        role: "生成销售交接单、SOP、异议处理和每日人工待办。",
        model: "默认模型",
        skills: "0 个技能",
        enabled: true,
        prompt: "生成销售交接单、SOP、异议处理和每日人工待办。"
      },
      {
        icon: "控",
        name: "风控审核 Agent",
        role: "检查外发风险、夸大宣传、来源缺失和人工审批。",
        model: "默认模型",
        skills: "0 个技能",
        enabled: true,
        prompt: "检查外发风险、夸大宣传、来源缺失和人工审批。"
      },
      {
        icon: "归",
        name: "项目归纳 Agent",
        role: "汇总所有 Agent 输出，生成用户可读的最终总结。",
        model: "默认模型",
        skills: "0 个技能",
        enabled: true,
        prompt: "汇总所有 Agent 输出，生成用户可读的最终总结。"
      },
      {
        icon: "档",
        name: "项目归档 Agent",
        role: "保存成果、风控记录、待办和历史查看入口。",
        model: "默认模型",
        skills: "0 个技能",
        enabled: true,
        prompt: "保存成果、风控记录、待办和历史查看入口。"
      }
    ];

    const table = document.getElementById("agent-table");
    const modal = document.getElementById("modal");
    const toast = document.getElementById("toast");
    const search = document.getElementById("search");
    const statusFilter = document.getElementById("status-filter");
    const modelFilter = document.getElementById("model-filter");
    const statusStrip = document.getElementById("status-strip");
    const notice = document.getElementById("scope-notice");
    const app = document.getElementById("app");

    function renderAgents() {
      const query = search.value.trim().toLowerCase();
      const status = statusFilter.value;
      const model = modelFilter.value;
      table.querySelectorAll(".agent-row").forEach(row => row.remove());

      agents
        .filter(agent => {
          const text = `${agent.name} ${agent.role}`.toLowerCase();
          const matchesQuery = !query || text.includes(query);
          const matchesStatus = status === "all"
            || (status === "enabled" && agent.enabled)
            || (status === "disabled" && !agent.enabled);
          const matchesModel = model === "all"
            || (model === "default" && agent.model === "默认模型")
            || (model === "custom" && agent.model !== "默认模型");
          return matchesQuery && matchesStatus && matchesModel;
        })
        .forEach((agent, index) => {
          const row = document.createElement("div");
          row.className = "agent-row";
          row.innerHTML = `
            <div class="agent-main">
              <span class="avatar">${agent.icon}</span>
              <span class="agent-title">
                <strong>${agent.name}</strong>
                <small>仅当前空间生效</small>
              </span>
            </div>
            <div class="summary">${agent.role}</div>
            <div class="meta"><strong>${agent.model}</strong><span>${agent.skills}</span></div>
            <span class="pill ${agent.enabled ? "ok" : "warn"}">${agent.enabled ? "启用" : "停用"}</span>
            <div class="row-actions">
              <button class="btn edit" type="button" data-index="${index}">编辑</button>
              <button class="icon-btn more" type="button" aria-label="更多操作" data-index="${index}">...</button>
              <div class="menu">
                <button type="button">${agent.enabled ? "停用" : "启用"}</button>
                <button type="button">上移</button>
                <button type="button">下移</button>
                <button type="button" class="danger">移出工作区</button>
              </div>
            </div>
          `;
          table.appendChild(row);
        });
    }

    function openEditor(agent) {
      document.getElementById("agent-name").value = agent.name;
      document.getElementById("agent-icon").value = agent.icon;
      document.getElementById("agent-desc").value = agent.role;
      document.getElementById("agent-identity").value = agent.name;
      document.getElementById("agent-prompt").value = agent.prompt;
      document.getElementById("agent-model").value = agent.model === "默认模型" ? "" : agent.model;
      document.getElementById("agent-skills").value = "";
      modal.classList.add("open");
    }

    function closeEditor() {
      modal.classList.remove("open");
    }

    function showToast() {
      toast.classList.add("show");
      window.setTimeout(() => toast.classList.remove("show"), 1400);
    }

    document.addEventListener("click", event => {
      const edit = event.target.closest(".edit");
      const more = event.target.closest(".more");
      if (edit) {
        openEditor(agents[Number(edit.dataset.index)]);
      }
      if (more) {
        document.querySelectorAll(".menu.open").forEach(menu => {
          if (menu !== more.nextElementSibling) menu.classList.remove("open");
        });
        more.nextElementSibling.classList.toggle("open");
      }
      if (!event.target.closest(".row-actions")) {
        document.querySelectorAll(".menu.open").forEach(menu => menu.classList.remove("open"));
      }
    });

    [search, statusFilter, modelFilter].forEach(control => {
      control.addEventListener("input", renderAgents);
      control.addEventListener("change", renderAgents);
    });

    document.getElementById("close-modal").addEventListener("click", closeEditor);
    document.getElementById("cancel-modal").addEventListener("click", closeEditor);
    document.getElementById("save-modal").addEventListener("click", () => {
      closeEditor();
      showToast();
    });
    document.getElementById("new-agent").addEventListener("click", () => {
      openEditor({
        icon: "新",
        name: "新建 Agent",
        role: "",
        model: "默认模型",
        skills: "0 个技能",
        prompt: ""
      });
    });

    document.getElementById("density-switch").addEventListener("click", event => {
      event.currentTarget.classList.toggle("on");
      app.classList.toggle("density-loose");
    });

    document.getElementById("status-switch").addEventListener("click", event => {
      event.currentTarget.classList.toggle("on");
      statusStrip.hidden = !statusStrip.hidden;
    });

    document.getElementById("notice-switch").addEventListener("click", event => {
      event.currentTarget.classList.toggle("on");
      notice.hidden = !notice.hidden;
    });

    modal.addEventListener("click", event => {
      if (event.target === modal) closeEditor();
    });

    window.addEventListener("keydown", event => {
      if (event.key === "Escape") closeEditor();
    });

    renderAgents();
  </script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1" name="viewport">
  <title>企业获客空间知识库 - 控制台原型</title>
  <style>
    :root {
      --bg: #ffffff;
      --sidebar: #f4f6f8;
      --surface: #f7f8fa;
      --surface-strong: #edf1f5;
      --panel: #ffffff;
      --border: #e2e6ec;
      --border-strong: #cfd6df;
      --text: #23262b;
      --secondary: #5f6774;
      --muted: #8a93a0;
      --primary: #2f80ff;
      --primary-soft: #eaf2ff;
      --green: #168a5b;
      --green-soft: #e7f7ee;
      --amber: #a66b12;
      --amber-soft: #fff4d8;
      --red: #c93f4d;
      --red-soft: #fff0f2;
      --purple: #7557d8;
      --purple-soft: #f0edff;
      --shadow: 0 18px 44px rgba(31, 35, 41, 0.10);
      --shadow-soft: 0 10px 24px rgba(31, 35, 41, 0.07);
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
      "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 1180px;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      letter-spacing: 0;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      display: grid;
      grid-template-columns: 248px minmax(0, 1fr);
      min-height: 100vh;
      background: var(--bg);
    }

    .sidebar {
      display: flex;
      min-height: 100vh;
      flex-direction: column;
      border-right: 1px solid var(--border);
      background: var(--sidebar);
      padding: 14px 14px 16px;
    }

    .traffic {
      display: flex;
      align-items: center;
      gap: 9px;
      height: 26px;
      margin-bottom: 18px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
    }

    .dot.red {
      background: #ff5f57;
    }

    .dot.yellow {
      background: #ffbd2e;
    }

    .dot.green {
      background: #28c840;
    }

    .nav {
      display: grid;
      gap: 3px;
    }

    .nav-button {
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      min-height: 38px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      padding: 8px 9px;
      text-align: left;
    }

    .nav-button:hover,
    .nav-button.active {
      background: #e8edf4;
    }

    .nav-button.active {
      font-weight: 720;
    }

    .icon {
      display: inline-flex;
      width: 22px;
      height: 22px;
      align-items: center;
      justify-content: center;
      color: var(--secondary);
      font-size: 16px;
      line-height: 1;
    }

    .nav-text,
    .recent-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .divider {
      height: 1px;
      margin: 18px 0;
      background: var(--border);
    }

    .section-label {
      margin: 18px 8px 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 680;
    }

    .recent-list {
      display: grid;
      gap: 2px;
    }

    .recent {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      padding: 7px 8px;
      text-align: left;
    }

    .recent:hover {
      background: #e8edf4;
    }

    .recent-title {
      font-size: 14px;
      font-weight: 640;
    }

    .recent-time {
      color: var(--muted);
      font-size: 12px;
    }

    .main {
      display: grid;
      min-width: 0;
      min-height: 100vh;
      grid-template-rows: auto minmax(0, 1fr);
      background: linear-gradient(180deg, rgba(246, 247, 249, 0.72), rgba(255, 255, 255, 0) 180px),
      var(--bg);
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
      gap: 20px;
      border-bottom: 1px solid var(--border);
      padding: 24px 34px 18px;
    }

    .eyebrow {
      margin: 0 0 5px;
      color: var(--primary);
      font-size: 12px;
      font-weight: 780;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      color: var(--text);
      font-size: 24px;
      font-weight: 760;
      line-height: 1.22;
    }

    .subtitle {
      margin-top: 7px;
      color: var(--secondary);
      font-size: 13px;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .button {
      display: inline-flex;
      min-height: 34px;
      align-items: center;
      justify-content: center;
      gap: 7px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: #fff;
      color: var(--text);
      padding: 0 12px;
      font-size: 13px;
      font-weight: 680;
      box-shadow: 0 1px 0 rgba(31, 35, 41, 0.04);
    }

    .button:hover {
      border-color: var(--border-strong);
      background: var(--surface);
    }

    .button.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }

    .button.danger {
      border-color: #f0c4ca;
      background: var(--red-soft);
      color: var(--red);
    }

    .summary-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1px;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--border);
      box-shadow: var(--shadow-soft);
    }

    .metric {
      min-width: 0;
      background: #fff;
      padding: 14px 16px;
    }

    .metric-value {
      font-size: 22px;
      font-weight: 780;
      line-height: 1;
    }

    .metric-label {
      margin-top: 5px;
      color: var(--secondary);
      font-size: 12px;
      font-weight: 650;
    }

    .metric.warning .metric-value {
      color: var(--amber);
    }

    .metric.good .metric-value {
      color: var(--green);
    }

    .workspace {
      display: grid;
      min-height: 0;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 18px;
      padding: 18px 34px 28px;
    }

    .knowledge-layout {
      display: grid;
      min-height: 0;
      grid-template-columns: 220px minmax(420px, 1fr) 360px;
      gap: 16px;
    }

    .panel {
      min-height: 0;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      box-shadow: var(--shadow-soft);
    }

    .category-panel {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      padding: 13px 14px;
    }

    .panel-title {
      font-size: 13px;
      font-weight: 760;
    }

    .tiny {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .category-list {
      display: grid;
      align-content: start;
      gap: 4px;
      overflow: auto;
      padding: 10px;
    }

    .category {
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      min-height: 42px;
      border: 0;
      border-radius: 9px;
      background: transparent;
      color: var(--text);
      padding: 7px 8px;
      text-align: left;
    }

    .category:hover,
    .category.active {
      background: var(--surface);
    }

    .category.active {
      box-shadow: inset 3px 0 0 var(--primary);
    }

    .category-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 700;
    }

    .category-sub {
      margin-top: 1px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
    }

    .count {
      min-width: 24px;
      border-radius: 999px;
      background: var(--surface-strong);
      color: var(--secondary);
      padding: 2px 7px;
      text-align: center;
      font-size: 12px;
      font-weight: 720;
    }

    .list-panel {
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      overflow: hidden;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      padding: 12px 14px;
    }

    .search {
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      min-height: 34px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: var(--surface);
      padding: 0 10px;
    }

    .search input {
      min-width: 0;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 13px;
    }

    .select {
      height: 34px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: #fff;
      color: var(--secondary);
      padding: 0 9px;
      font-size: 13px;
      font-weight: 650;
    }

    .section-context {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      padding: 11px 14px;
      color: var(--secondary);
      font-size: 12px;
      line-height: 1.5;
    }

    .item-list {
      display: grid;
      align-content: start;
      gap: 8px;
      overflow: auto;
      padding: 12px;
    }

    .knowledge-item {
      display: grid;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      padding: 12px;
      text-align: left;
    }

    .knowledge-item:hover,
    .knowledge-item.active {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(47, 128, 255, 0.10);
    }

    .item-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
    }

    .item-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 760;
    }

    .item-summary {
      color: var(--secondary);
      font-size: 13px;
      line-height: 1.55;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      border-radius: 999px;
      background: var(--surface);
      color: var(--secondary);
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 680;
      white-space: nowrap;
    }

    .tag.primary {
      background: var(--primary-soft);
      color: var(--primary);
    }

    .tag.good {
      background: var(--green-soft);
      color: var(--green);
    }

    .tag.warn {
      background: var(--amber-soft);
      color: var(--amber);
    }

    .tag.red {
      background: var(--red-soft);
      color: var(--red);
    }

    .detail-panel {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      overflow: hidden;
    }

    .detail-body {
      display: grid;
      align-content: start;
      gap: 16px;
      overflow: auto;
      padding: 16px;
    }

    .detail-title {
      font-size: 18px;
      font-weight: 780;
      line-height: 1.35;
    }

    .detail-text {
      color: var(--secondary);
      font-size: 13px;
      line-height: 1.7;
    }

    .fact-box {
      display: grid;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      padding: 12px;
    }

    .fact-row {
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr);
      gap: 10px;
      color: var(--secondary);
      font-size: 12px;
      line-height: 1.5;
    }

    .fact-label {
      color: var(--muted);
      font-weight: 700;
    }

    .agent-list {
      display: grid;
      gap: 7px;
    }

    .agent {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: #fff;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    .detail-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border-top: 1px solid var(--border);
      padding: 12px 14px;
    }

    .detail-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .empty {
      margin: 22px;
      border: 1px dashed var(--border-strong);
      border-radius: 12px;
      color: var(--secondary);
      padding: 20px;
      text-align: center;
      font-size: 13px;
      line-height: 1.6;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(20, 24, 31, 0.22);
      padding: 24px;
      z-index: 20;
    }

    body[data-modal="knowledge"] .modal-backdrop {
      display: grid;
    }

    .modal {
      width: min(840px, 100%);
      max-height: min(860px, calc(100vh - 48px));
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .modal-header,
    .modal-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
    }

    .modal-header {
      border-bottom: 1px solid var(--border);
    }

    .modal-footer {
      border-top: 1px solid var(--border);
    }

    .modal-body {
      display: grid;
      max-height: calc(100vh - 180px);
      gap: 14px;
      overflow: auto;
      padding: 16px;
    }

    .type-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .type-card {
      display: grid;
      gap: 4px;
      min-height: 74px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      padding: 10px;
      text-align: left;
    }

    .type-card:hover,
    .type-card.active {
      border-color: var(--primary);
      background: var(--primary-soft);
    }

    .type-card strong {
      font-size: 13px;
    }

    .type-card span {
      color: var(--secondary);
      font-size: 11px;
      line-height: 1.45;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .company-material {
      display: none;
      gap: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      padding: 12px;
    }

    body[data-knowledge-type="company"] .company-material {
      display: grid;
    }

    .agent-scope {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .check-card {
      display: flex;
      min-height: 38px;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: #fff;
      color: var(--secondary);
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    .modal-note {
      border: 1px solid var(--amber-soft);
      border-radius: 10px;
      background: #fffaf0;
      color: var(--amber);
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.55;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--secondary);
      font-size: 12px;
      font-weight: 700;
    }

    .field,
    textarea.field {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      padding: 10px;
      font-size: 13px;
      line-height: 1.5;
    }

    textarea.field {
      min-height: 116px;
      resize: vertical;
    }

    .toast {
      position: fixed;
      right: 28px;
      bottom: 24px;
      display: none;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      box-shadow: var(--shadow);
      color: var(--text);
      padding: 12px 14px;
      font-size: 13px;
      font-weight: 700;
      z-index: 30;
    }

    body[data-toast="sync"] .toast {
      display: block;
    }

    @media (max-width: 980px) {
      body {
        min-width: 0;
      }

      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }

      .topbar,
      .workspace {
        padding-left: 16px;
        padding-right: 16px;
      }

      .summary-strip {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .knowledge-layout {
        grid-template-columns: 1fr;
      }

      .detail-panel {
        min-height: 420px;
      }
    }
  </style>
</head>
<body>
<div class="app">
  <aside aria-label="空间侧栏" class="sidebar">
    <div aria-hidden="true" class="traffic">
      <span class="dot red"></span>
      <span class="dot yellow"></span>
      <span class="dot green"></span>
    </div>
    <nav aria-label="空间操作" class="nav">
      <button class="nav-button"><span class="icon">✎</span><span class="nav-text">新对话</span></button>
      <button class="nav-button"><span class="icon">⌕</span><span class="nav-text">搜索</span></button>
    </nav>
    <div class="divider"></div>
    <nav aria-label="空间功能" class="nav">
      <button class="nav-button"><span class="icon">▦</span><span class="nav-text">工作台</span></button>
      <button class="nav-button active"><span class="icon">□</span><span class="nav-text">知识库</span></button>
      <button class="nav-button"><span class="icon">⚙</span><span class="nav-text">空间设置</span></button>
    </nav>
    <div class="section-label">对话记录</div>
    <div class="recent-list">
      <button class="recent"><span class="recent-title">帮我找长三角机械厂线索</span><span
        class="recent-time">6 分</span></button>
      <button class="recent"><span class="recent-title">改写小红书获客文案</span><span class="recent-time">20 分</span>
      </button>
      <button class="recent"><span class="recent-title">生成销售交接清单</span><span class="recent-time">14 小时</span>
      </button>
      <button class="recent"><span class="recent-title">检查外发内容风险</span><span class="recent-time">昨天</span>
      </button>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="min-title">
        <p class="eyebrow">知识库</p>
        <h1>杭州启盛精密制造有限公司</h1>
        <p class="subtitle">管理当前空间会被 AI 对话、工作台 Agent 和任务沉淀引用的上下文。</p>
      </div>
      <div class="actions">
        <button class="button" id="syncBtn">↻ 同步来源</button>
        <button class="button" id="companyBtn">▣ 维护公司资料</button>
        <button class="button primary" id="addBtn">＋ 添加内容</button>
      </div>
    </header>

    <section aria-label="知识控制台" class="workspace">
      <div aria-label="知识状态摘要" class="summary-strip">
        <div class="metric good">
          <div class="metric-value">43</div>
          <div class="metric-label">可被 AI 引用</div>
        </div>
        <div class="metric">
          <div class="metric-value">8</div>
          <div class="metric-label">知识分类</div>
        </div>
        <div class="metric warning">
          <div class="metric-value">6</div>
          <div class="metric-label">待补充信息</div>
        </div>
        <div class="metric">
          <div class="metric-value">2</div>
          <div class="metric-label">任务沉淀</div>
        </div>
      </div>

      <div class="knowledge-layout">
        <section aria-label="知识分类" class="panel category-panel">
          <div class="panel-header">
            <h2 class="panel-title">分类</h2>
            <span class="tiny">空间内生效</span>
          </div>
          <div class="category-list" id="categoryList"></div>
        </section>

        <section aria-label="知识条目" class="panel list-panel">
          <div class="toolbar">
            <div class="search">
              <span class="icon">⌕</span>
              <input id="searchInput" placeholder="搜索产品、客户、规则、来源" type="search">
            </div>
            <select aria-label="筛选知识状态" class="select" id="filterSelect">
              <option value="all">全部状态</option>
              <option value="ready">可引用</option>
              <option value="missing">待补充</option>
              <option value="review">需确认</option>
            </select>
          </div>
          <div class="section-context">
            <span id="sectionDescription">这些知识会作为 AI 对话和 Agent 任务的上下文。</span>
            <span id="visibleCount">0 条</span>
          </div>
          <div class="item-list" id="itemList"></div>
        </section>

        <aside aria-label="知识详情" class="panel detail-panel">
          <div class="panel-header">
            <h2 class="panel-title">详情</h2>

    return items.filter(item => item.category === categoryId && !item.archived);
  }

    categoryList.innerHTML = categories.map(category => {
      const count = getCategoryItems(category.id).length;
      return `
          <button class="category ${category.id === activeCategory ? 'active' : ''}" data-category="${category.id}">

            <span>
              <span class="category-name">${category.name}</span>
              <span class="category-sub">${category.sub}</span>
            </span>
            <span class="count">${count}</span>
          </button>
        `;
    }).join('');
  }

  function getFilteredItems() {
    const query = searchInput.value.trim().toLowerCase();
    const filter = filterSelect.value;
    return getCategoryItems(activeCategory).filter(item => {
      const matchesQuery = !query || [item.title, item.summary, item.detail, item.source].join(' ').toLowerCase().includes(query);
      const matchesFilter = filter === 'all' || item.status === filter;
      return matchesQuery && matchesFilter;
    });
  }

  function renderItems() {
    const filteredItems = getFilteredItems();
    const category = categories.find(item => item.id === activeCategory);
    sectionDescription.textContent = category ? category.description : '';
    visibleCount.textContent = `${filteredItems.length} 条`;

    if (!filteredItems.some(item => item.id === activeItemId)) {
      activeItemId = filteredItems[0]?.id || '';
    }

    if (filteredItems.length === 0) {
      itemList.innerHTML = '<div class="empty">没有匹配的知识。可以换个关键词，或添加一条新内容。</div>';
      renderDetail(null);
      return;

          <span class="tags">

            <span class="tag">${item.updated}</span>
          </span>
        </button>

    renderDetail(getCurrentItem());

      ['禁用表述', document.querySelector('#companyBanned').value],
      ['联系方式与渠道规则', document.querySelector('#companyContact').value],
    ];
    return parts.map(([label, value]) => `${label}：${value.trim()}`).join('\n');
  }

  function openKnowledgeModal(mode, presetType = 'manual') {
    const item = mode === 'edit' ? getCurrentItem() : null;
    editingItemId = item?.id || '';
    modalTitle.textContent = item ? '编辑知识内容' : '添加知识内容';
    document.body.dataset.modal = 'knowledge';

    if (item) {
      setModalType(item.type || 'manual');
      modalCategory.value = item.category;
      modalStatus.value = item.status;
      modalTitleInput.value = item.title;
      modalSummaryInput.value = item.summary;
      modalDetailInput.value = item.detail;
      modalSourceInput.value = item.source;
      modalTagsInput.value = item.tags || '';
      modalHint.textContent = '编辑只影响当前空间，保存后会立即更新知识列表和右侧详情。';
      setAgentScope(item.agents);
      return;
    }

    setModalType(presetType);
    if (presetType === 'manual') {
      modalCategory.value = activeCategory;
      modalStatus.value = 'review';
      modalTitleInput.value = '';
      modalSummaryInput.value = '';
      modalDetailInput.value = '';
      modalTagsInput.value = '';
    }
    setAgentScope(['产品理解 Agent', '商机雷达 Agent', '内容策划 Agent']);
  }

  function closeKnowledgeModal() {
    document.body.dataset.modal = '';
  }

  function saveKnowledgeModal() {
    const category = modalCategory.value;
    const status = modalStatus.value;
    const title = modalTitleInput.value.trim() || '未命名知识';
    const summary = modalSummaryInput.value.trim() || '暂无摘要。';
    const detail = activeKnowledgeType === 'company' ? buildCompanyDetail() : modalDetailInput.value.trim();
    const payload = {
      category,
      title,
      summary,
      detail: detail || '暂无正文。',
      status,
      statusText: statusLabelMap[status],
      source: modalSourceInput.value.trim() || '手动添加',
      updated: '刚刚',
      agents: getSelectedAgents(),
      tags: modalTagsInput.value.trim(),
      type: activeKnowledgeType,
      archived: false,
    };

    if (editingItemId) {
      const index = items.findIndex(item => item.id === editingItemId);
      if (index >= 0) {
        items[index] = { ...items[index], ...payload };
        activeItemId = editingItemId;
      }
      showToast('已更新当前空间知识');
    } else {
      const id = `knowledge-${Date.now()}`;
      items = [{ id, ...payload }, ...items];
      activeItemId = id;
      showToast(activeKnowledgeType === 'company' ? '公司资料已保存，等待确认引用' : '已添加知识，等待确认引用');
    }

    activeCategory = category;
    closeKnowledgeModal();
    renderCategories();
    renderItems();
  }

  categoryList.addEventListener('click', event => {
    const button = event.target.closest('[data-category]');
    if (!button) return;
    activeCategory = button.dataset.category;
    activeItemId = getCategoryItems(activeCategory)[0]?.id || '';
    renderCategories();
    renderItems();
  });

  itemList.addEventListener('click', event => {
    const button = event.target.closest('[data-item]');
    if (!button) return;
    activeItemId = button.dataset.item;
    renderItems();
  });

  searchInput.addEventListener('input', renderItems);
  filterSelect.addEventListener('change', renderItems);

  typeCards.forEach(card => {
    card.addEventListener('click', () => {
      setModalType(card.dataset.type);
    });
  });

  document.querySelector('#addBtn').addEventListener('click', () => {
    openKnowledgeModal('add', activeCategory === 'company' ? 'company' : 'manual');
  });

  document.querySelector('#companyBtn').addEventListener('click', () => {
    openKnowledgeModal('add', 'company');
  });

  document.querySelector('#closeModalBtn').addEventListener('click', () => {
    closeKnowledgeModal();
  });

  document.querySelector('#saveModalBtn').addEventListener('click', () => {
    saveKnowledgeModal();
  });

  document.querySelector('#editBtn').addEventListener('click', () => {
    if (!getCurrentItem()) {
      showToast('请先选择一条知识');
      return;
    }
    openKnowledgeModal('edit');
  });

  document.querySelector('#archiveBtn').addEventListener('click', () => {
    const item = getCurrentItem();
    if (!item) {
      showToast('请先选择一条知识');
      return;
    }
    item.archived = true;
    activeItemId = getCategoryItems(activeCategory)[0]?.id || '';
    renderCategories();
    renderItems();
    showToast('已归档，不再作为默认知识显示');
  });

  document.querySelector('#syncBtn').addEventListener('click', () => {
    showToast('已同步来源并更新知识状态');
  });

  document.querySelector('#askBtn').addEventListener('click', () => {
    showToast('已带入 AI 对话上下文');
  });

  document.querySelector('#confirmBtn').addEventListener('click', () => {
    const item = getCurrentItem();
    if (!item) {
      showToast('请先选择一条知识');
      return;
    }
    item.status = 'ready';
    item.statusText = '可引用';
    item.updated = '刚刚';
    renderItems();
    showToast('已确认，后续任务可引用');
  });

  function showToast(text) {
    document.querySelector('#toast').textContent = text;
    document.body.dataset.toast = 'sync';
    window.clearTimeout(showToast.timer);
    showToast.timer = window.setTimeout(() => {
      document.body.dataset.toast = '';
    }, 1800);
  }

  renderCategories();
  renderItems();
</script>
</body>
</html>
